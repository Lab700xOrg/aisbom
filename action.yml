# LOCATION: ~/Projects/sbom/aisbom-cli/action.yml

name: 'AIsbom Security Scanner'
description: 'Deep introspection of ML model artifacts for malware, license risk, and silent drift. Posts a PR comment summarizing findings with a link to the hosted viewer.'
author: 'Lab700xOrg'
branding:
  icon: 'shield'
  color: 'purple'

inputs:
  directory:
    description: 'Directory to scan for AI model artifacts.'
    required: true
    default: '.'
  output-file:
    description: 'Path to save the generated SBOM JSON file.'
    required: false
    default: 'sbom.json'
  github-token:
    description: 'GitHub token used to post the PR comment. Defaults to the workflow-provided token. Requires `pull-requests: write` permission on the consuming workflow.'
    required: false
    default: ${{ github.token }}
  max-rows:
    description: 'Maximum number of artifacts to list in the PR comment findings table. Overflow collapses into a "+ N more findings" row.'
    required: false
    default: '10'
  comment-on-clean:
    description: 'Post the PR comment even when no CRITICAL or HIGH findings were detected. Set to "false" to keep clean PRs silent.'
    required: false
    default: 'true'
  fail-on-risk:
    description: 'Exit the job with a non-zero status when CRITICAL findings are detected (matches the CLI default). Set to "false" to make scans informational only.'
    required: false
    default: 'true'
  token:
    description: 'Optional. Per-repo API token for posting the generated SBOM to a persistent inventory dashboard. Leave unset for purely local PR-comment behavior. (The dashboard is in private early access.)'
    required: false
    default: ''
  platform-url:
    description: 'Override for the platform webhook URL. Leave blank to use the default. Only meaningful when `token:` is set.'
    required: false
    default: ''
  fail-on-platform-error:
    description: 'Default false. When true, a failed upload fails the CI job.'
    required: false
    default: 'false'

outputs:
  sbom-path:
    description: 'Path to the generated SBOM JSON file (relative to the workspace).'
  share-url:
    description: 'Hosted viewer URL for the scanned SBOM (empty if --share was rejected or upload failed).'

runs:
  using: 'docker'
  image: 'Dockerfile'
  # IMPORTANT: pass inputs as positional args, not env vars.
  # GitHub auto-converts hyphenated input names into env vars whose names
  # also contain hyphens (e.g. INPUT_GITHUB-TOKEN). POSIX shells can't
  # reliably read those, and `printenv` behavior is implementation-defined
  # for non-standard names. Positional args sidestep the whole mess and
  # GitHub still masks secret values in the rendered logs.
  args:
    - ${{ inputs.directory }}
    - ${{ inputs.output-file }}
    - ${{ inputs.github-token }}
    - ${{ inputs.max-rows }}
    - ${{ inputs.comment-on-clean }}
    - ${{ inputs.fail-on-risk }}
    - ${{ inputs.token }}
    - ${{ inputs.platform-url }}
    - ${{ inputs.fail-on-platform-error }}
